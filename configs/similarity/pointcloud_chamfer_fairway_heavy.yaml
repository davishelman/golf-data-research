# v2.5 point-cloud Chamfer similarity — fairway-heavy.
#
# Emphasizes fairway shape/corridor for the "plays the same off the tee" question.
# Surface weights sum to 1.0.
model_name: pointcloud_chamfer
model_version: v2_5_chamfer_v1
config_name: fairway_heavy

candidate_filter:
  require_same_par: true
  yardage_windows:
    par_3:
      absolute_yards: 25
      percentage: 0.12
    par_4:
      absolute_yards: 40
      percentage: 0.10
    par_5:
      absolute_yards: 60
      percentage: 0.10

required_surfaces:
  - tee
  - green
  - fairway

surface_weights:
  fairway: 0.55
  green: 0.20
  bunker: 0.15
  water: 0.05
  tee: 0.05

surface_missing_penalties:
  fairway: 999.0
  green: 999.0
  tee: 999.0
  bunker: 40.0
  water: 50.0

point_budgets:
  fairway: 2500
  green: 600
  bunker: 800
  water: 800
  tee: 200

distance_scaling:
  x_weight: 1.5
  y_weight: 1.0
  z_weight: 1.5

penalties:
  par_mismatch: 999.0
  yardage_weight: 0.15
  tee_to_green_elevation_weight: 0.10
