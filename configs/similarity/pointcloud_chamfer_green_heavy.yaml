# v2.5 point-cloud Chamfer similarity — green-heavy.
#
# Emphasizes the green complex (green surface + tee->green elevation) for the
# "similar shot into a similar green" question. Surface weights sum to 1.0.
model_name: pointcloud_chamfer
model_version: v2_5_chamfer_v1
config_name: green_heavy

candidate_filter:
  require_same_par: true
  yardage_windows:
    par_3:
      absolute_yards: 25
      percentage: 0.12
    par_4:
      absolute_yards: 40
      percentage: 0.10
    par_5:
      absolute_yards: 60
      percentage: 0.10

required_surfaces:
  - tee
  - green
  - fairway

surface_weights:
  fairway: 0.20
  green: 0.50
  bunker: 0.15
  water: 0.10
  tee: 0.05

surface_missing_penalties:
  fairway: 999.0
  green: 999.0
  tee: 999.0
  bunker: 40.0
  water: 50.0

point_budgets:
  fairway: 1500
  green: 1000
  bunker: 800
  water: 800
  tee: 200

distance_scaling:
  x_weight: 1.0
  y_weight: 1.0
  z_weight: 2.5

penalties:
  par_mismatch: 999.0
  yardage_weight: 0.15
  tee_to_green_elevation_weight: 0.20
